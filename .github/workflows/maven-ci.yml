name: Java CI - Selenium Tests (Multi-OS)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Run tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Limpar cache do WebDriverManager (Windows/Linux/macOS)
        run: |
            echo "Cleaning WDM cache..."
            rm -rf ~/.cache/selenium || true
            rm -rf ~/.wdm || true
          shell: bash

      - name: Executar testes com Maven (headless)
        run: mvn clean test -Dheadless=true
